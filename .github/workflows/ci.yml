name: CNLocalGovSpread CI

on:
  push:
    branches: [main, 'gnhf/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short -m "not slow" --cov=src --cov-report=term-missing

      - name: Run integration tests
        run: |
          python -m pytest tests/ -v --tb=short -m integration

      - name: Test count verification
        run: |
          COUNT=$(python -m pytest tests/ --collect-only -q 2>&1 | tail -1 | grep -oP '\d+' | head -1)
          echo "Total test count: $COUNT"
          if [ "$COUNT" -lt 200 ]; then echo "FAIL: test count below 200 target"; exit 1; fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: pip install flake8

      - name: Lint src modules
        run: flake8 src/ --max-line-length=120 --ignore=E501,W503,E402,E226,F541,W504,E127,E131,E741 --exclude=__pycache__

      - name: Lint test modules
        run: flake8 tests/ --max-line-length=120 --ignore=E501,W503,E402,E226,F541,F841,W504,E127,E131,E741,E712 --exclude=__pycache__